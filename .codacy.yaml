---
# Codacy configuration.
#
# Scope analysis to production code (src/, web/ app code, scripts/). Test
# trees are held to different rules than runtime code — most notably Bandit
# B101 ("assert used"), which warns that `assert` is stripped under
# `python -O`. That risk is real for runtime code but irrelevant in tests:
# pytest and vitest are built on assertions and the suites never run
# optimized. The repo already relies on ~1300 test asserts, so gating PRs on
# that rule is pure noise. Test files are also the main source of clone
# (duplication) findings — repetitive arrange/act/assert blocks are a
# feature of readable tests, not a defect.
#
# Docs, agent skills/config, vendored license texts, generated files, and
# runtime artifacts are not product code; analyzing them only produces
# unactionable findings.
exclude_paths:
  # Test trees and test doubles
  - 'tests/**'
  - 'web/**/*.test.ts'
  - 'web/**/*.test.tsx'
  - 'web/lib/mocks/**'
  # Documentation and agent knowledge (prose, briefs, skill definitions)
  - 'docs/**'
  - 'agent-knowledge/**'
  - '.claude/**'
  - '.agents/**'
  # Vendored license texts
  - 'licenses/**'
  # Generated / runtime artifacts
  - 'web/next-env.d.ts'
  - 'data/**'
  - 'logs/**'
