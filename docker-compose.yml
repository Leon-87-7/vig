services:
  api:
    build: .
    image: vig-app
    container_name: vig-api
    env_file: .env
    ports:
      - '8000:8000'
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./credentials:/app/credentials:ro
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    networks:
      - vig-network

  worker:
    build: .
    image: vig-app
    container_name: vig-worker
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./credentials:/app/credentials:ro
    depends_on:
      redis:
        condition: service_started
      transcript-service:
        condition: service_healthy
    restart: unless-stopped
    command: python -m src.worker
    networks:
      - vig-network
    healthcheck:
      disable: true

  transcript-service:
    build:
      context: .
      dockerfile: Dockerfile.transcript
    container_name: vig-transcript
    environment:
      - INSTAGRAM_COOKIES=/app/credentials/instagram_cookies.txt
    volumes:
      - ./credentials:/app/credentials:ro
    restart: unless-stopped
    networks:
      - vig-network

  # ──────────────────────────────────────────────────────────────────────────
  # web — local Next.js frontend. DISABLED: Vercel is now serving the frontend.
  # Uncomment to restore local dev (see docs/ops/vercel-deploy.md).
  # ──────────────────────────────────────────────────────────────────────────
  # web:
  #   build:
  #     context: ./web
  #     dockerfile: Dockerfile
  #     args:
  #       - NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=photo2urlbot
  #   container_name: vig-web
  #   environment:
  #     - API_INTERNAL_URL=http://api:8000
  #   ports:
  #     - '3000:3000'
  #   depends_on:
  #     - api
  #   restart: unless-stopped
  #   networks:
  #     - vig-network

  # ──────────────────────────────────────────────────────────────────────────
  # cloudflared — Cloudflare Tunnel exposing the API at api.leondev.xyz.
  # GATED (commented out): uncomment once the tunnel is created in the Cloudflare
  # Zero Trust dashboard (public hostname api.leondev.xyz -> http://api:8000) and
  # CLOUDFLARE_TUNNEL_TOKEN is set in .env. See docs/ops/vercel-deploy.md (Option A).
  # ──────────────────────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vig-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - vig-network

  redis:
    image: redis:7-alpine
    container_name: vig-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - vig-network

volumes:
  redis_data:

networks:
  vig-network:
    driver: bridge
