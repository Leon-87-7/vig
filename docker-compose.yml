services:
  api:
    build: .
    image: vig-app
    container_name: vig-api
    env_file: .env
    ports:
      - '8000:8000'
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./credentials:/app/credentials:ro
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    networks:
      - vig-network

  worker:
    build: .
    image: vig-app
    container_name: vig-worker
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./credentials:/app/credentials:ro
    depends_on:
      redis:
        condition: service_started
      transcript-service:
        condition: service_healthy
    restart: unless-stopped
    command: python -m src.worker
    networks:
      - vig-network
    healthcheck:
      disable: true

  transcript-service:
    build:
      context: .
      dockerfile: Dockerfile.transcript
    container_name: vig-transcript
    environment:
      - INSTAGRAM_COOKIES=/app/credentials/instagram_cookies.txt
    volumes:
      - ./credentials:/app/credentials:ro
    restart: unless-stopped
    networks:
      - vig-network

  # ──────────────────────────────────────────────────────────────────────────
  # web — local Next.js frontend. DISABLED: Vercel is now serving the frontend.
  # Uncomment to restore local dev (see docs/ops/vercel-deploy.md).
  # ──────────────────────────────────────────────────────────────────────────
  # web:
  #   build:
  #     context: ./web
  #     dockerfile: Dockerfile
  #     args:
  #       - NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=photo2urlbot
  #   container_name: vig-web
  #   environment:
  #     - API_INTERNAL_URL=http://api:8000
  #   ports:
  #     - '3000:3000'
  #   depends_on:
  #     - api
  #   restart: unless-stopped
  #   networks:
  #     - vig-network

  # ──────────────────────────────────────────────────────────────────────────
  # cloudflared — Cloudflare Tunnel exposing the API at api.leondev.xyz.
  # GATED (commented out): uncomment once the tunnel is created in the Cloudflare
  # Zero Trust dashboard (public hostname api.leondev.xyz -> http://api:8000) and
  # CLOUDFLARE_TUNNEL_TOKEN is set in .env. See docs/ops/vercel-deploy.md (Option A).
  # ──────────────────────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vig-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - api
      - ntfy
    networks:
      - vig-network

  # ──────────────────────────────────────────────────────────────────────────
  # ntfy — self-hosted push notifications for operator/admin alerts (NOT the
  # user-facing Telegram bot). Private instance: NTFY_AUTH_DEFAULT_ACCESS=deny-all
  # means nothing can publish or subscribe without an access token — create one
  # per docs/ops/ntfy.md. Reached from inside the network at http://ntfy:80 and
  # exposed publicly as ntfy.leondev.xyz via the existing Cloudflare Tunnel: add
  # a Public Hostname (Zero Trust → Networks → Tunnels → vig-api) mapping
  # ntfy.leondev.xyz → http://ntfy:80. No host port is opened.
  # ──────────────────────────────────────────────────────────────────────────
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: vig-ntfy
    command: serve
    environment:
      - NTFY_BASE_URL=${NTFY_BASE_URL:-https://ntfy.leondev.xyz}
      - NTFY_BEHIND_PROXY=true
      - NTFY_LISTEN_HTTP=:80
      - NTFY_CACHE_FILE=/var/cache/ntfy/cache.db
      - NTFY_ATTACHMENT_CACHE_DIR=/var/cache/ntfy/attachments
      - NTFY_AUTH_FILE=/var/lib/ntfy/user.db
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
    volumes:
      - ntfy_cache:/var/cache/ntfy
      - ntfy_lib:/var/lib/ntfy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:80/v1/health | grep -q ''"healthy":true'' || exit 1']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - vig-network

  redis:
    image: redis:7-alpine
    container_name: vig-redis
    # ports:
    #   - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - vig-network

volumes:
  redis_data:
  ntfy_cache:
  ntfy_lib:

networks:
  vig-network:
    driver: bridge
